<div class="flex flex-col flex-auto items-center sm:justify-center min-w-0">
    <div
        class="w-full sm:w-auto py-8 px-4 sm:p-12 sm:rounded-2xl sm:shadow sm:bg-card"
    >
        <div class="w-full text-center max-w-100 sm:w-100 mx-auto sm:mx-0">
            <!-- Logo -->
            <!-- <div class="w-28 flex flex-row">
                <img src="assets/images/avatars/usaid.png">
            </div> -->

            <!-- Title -->
            <div class="flex justify-center gap-8">
                <div
                    class="mt-8 text-2xl font-extrabold tracking-tight leading-tight"
                >
                    <!-- style="height: 100px; width: 200px" -->
                    <img
                        class="logo1"
                        src="../../../../assets/icons/USAID-Identity.svg"
                        alt=""
                    />
                </div>
                <!-- <div
                    class="mt-8 text-2xl font-extrabold tracking-tight leading-tight"
                >
                    <img
                        style="height: 100px; width: 200px"
                        class="logo1"
                        src="../../../../assets/icons/DAI.svg"
                        alt=""
                    />
                </div> -->
            </div>
            <div
                class="mt-8 text-2xl font-extrabold tracking-tight leading-tight"
            >
                TRIPMATE
            </div>
            <div
                class="mt-8 text-2xl font-extrabold tracking-tight leading-tight"
            >
                Sign in
            </div>

            <!-- Alert -->
            <fuse-alert
                class="mt-8"
                *ngIf="showAlert"
                [appearance]="'outline'"
                [showIcon]="false"
                [type]="alert.type"
                [@shake]="alert.type === 'error'"
            >
                {{ alert.message }}
            </fuse-alert>

            <!-- Sign in form -->
            <form class="mt-8" [formGroup]="signInForm" #signInNgForm="ngForm">
                <!-- Username field -->
                <mat-form-field class="w-full">
                    <mat-label>Email</mat-label>
                    <input
                        id="email"
                        matInput
                        [formControlName]="'email'"
                    />
                    <mat-error
                        *ngIf="signInForm.get('email').hasError('required')"
                    >
                        Username is required
                    </mat-error>
                    <mat-error
                        *ngIf="signInForm.get('email').hasError('email')"
                    >
                        Please enter a valid username
                    </mat-error>
                </mat-form-field>

                <!-- Password field -->
                <mat-form-field class="w-full">
                    <mat-label>Password</mat-label>
                    <input
                        id="password"
                        matInput
                        type="password"
                        [formControlName]="'password'"
                        #passwordField
                    />
                    <button
                        mat-icon-button
                        type="button"
                        (click)="
                            passwordField.type === 'password'
                                ? (passwordField.type = 'text')
                                : (passwordField.type = 'password')
                        "
                        matSuffix
                    >
                        <mat-icon
                            class="icon-size-5"
                            *ngIf="passwordField.type === 'password'"
                            [svgIcon]="'heroicons_solid:eye'"
                        ></mat-icon>
                        <mat-icon
                            class="icon-size-5"
                            *ngIf="passwordField.type === 'text'"
                            [svgIcon]="'heroicons_solid:eye-off'"
                        ></mat-icon>
                    </button>
                    <mat-error> Password is required </mat-error>
                </mat-form-field>

                <!-- Actions -->
                <div class="flex items-center justify-between">
                    <div class="items-center mt-1.5">
                        <!-- <mat-checkbox
                        class="-ml-2"
                        [color]="'primary'"
                        [formControlName]="'rememberMe'">
                        Remember me
                    </mat-checkbox> -->
                        <!-- [routerLink]="['/forgot-password']" -->
                        <a
                            [routerLink]="['/forgot-password']"
                            class="text-md font-medium color-brand-500 hover:underline"
                            >Forgot password?
                        </a>
                    </div>

                    
                </div>

                <!-- Submit button -->
                <!-- class="fuse-mat-button-large w-full mt-6 text-gray-50" -->
                <button
                    class="fuse-mat-button-large w-full mt-6 text-white bg-[#1a447b] hover:bg-[#6682a7]"
                    mat-flat-button
                    [color]="'primary'"
                    [disabled]="signInForm.disabled"
                    (click)="signIn()"
                >
                    <span *ngIf="!signInForm.disabled"> Sign in </span>
                    <mat-progress-spinner
                        *ngIf="signInForm.disabled"
                        [diameter]="24"
                        [mode]="'indeterminate'"
                    ></mat-progress-spinner>
                </button>

             
              
            </form>
        </div>
    </div>
</div>
